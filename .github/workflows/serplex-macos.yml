name: Serplex macOS Tauri build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build. Leave empty to use app-version.json."
        required: false
        default: ""
      arch:
        description: "macOS architecture to build."
        required: true
        default: "arm64"
        type: choice
        options:
          - arm64
          - x64
          - both

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-arm64:
    name: macOS arm64
    if: ${{ github.event.inputs.arch == 'arm64' || github.event.inputs.arch == 'both' }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build Serplex for macOS arm64
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $args = @("--bundles", "app")
          if ($version) {
            ./Build-Serplex-Tauri.ps1 -Version $version -OutputDir "dist/SerplexTauri" -TauriArgs $args -SkipNpmInstall
          } else {
            ./Build-Serplex-Tauri.ps1 -OutputDir "dist/SerplexTauri" -TauriArgs $args -SkipNpmInstall
          }

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: serplex-macos-arm64
          path: dist/SerplexTauri/*
          if-no-files-found: error

  build-x64:
    name: macOS x64
    if: ${{ github.event.inputs.arch == 'x64' || github.event.inputs.arch == 'both' }}
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build Serplex for macOS x64
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $args = @("--bundles", "app")
          if ($version) {
            ./Build-Serplex-Tauri.ps1 -Version $version -OutputDir "dist/SerplexTauri" -TauriArgs $args -SkipNpmInstall
          } else {
            ./Build-Serplex-Tauri.ps1 -OutputDir "dist/SerplexTauri" -TauriArgs $args -SkipNpmInstall
          }

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: serplex-macos-x64
          path: dist/SerplexTauri/*
          if-no-files-found: error
