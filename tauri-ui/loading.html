<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Serplex</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, Segoe UI, Arial, sans-serif;
        background: #171717;
        color: #f4f1ec;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 18% 16%, rgba(255, 138, 61, 0.18), transparent 32%),
          linear-gradient(180deg, #1a1715, #111);
      }
      main {
        display: grid;
        gap: 16px;
        justify-items: center;
        text-align: center;
      }
      .mark {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: linear-gradient(135deg, #ff8a3d, #27160d);
        box-shadow: 0 0 42px rgba(255, 138, 61, 0.46);
      }
      h1 {
        margin: 0;
        font-size: 30px;
      }
      p {
        margin: 0;
        color: #aaa29a;
      }
      .dots {
        display: flex;
        gap: 7px;
        align-items: center;
        height: 22px;
      }
      .dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #ff8a3d;
        animation: pulse 1.1s infinite ease-in-out;
      }
      .dots span:nth-child(2) {
        animation-delay: 0.15s;
      }
      .dots span:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes pulse {
        0%, 80%, 100% { transform: translateY(4px); opacity: 0.45; }
        40% { transform: translateY(-4px); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark"></div>
      <h1>Serplex</h1>
      <p>Запуск локального сервера</p>
      <div class="dots" aria-hidden="true"><span></span><span></span><span></span></div>
    </main>
  </body>
</html>
